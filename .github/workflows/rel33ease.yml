name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub release after building"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Linux: .deb · .AppImage · .rpm ─────────────────────────────────────
  build-linux:
    name: Linux (${{ matrix.bundle }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        bundle: [deb, appimage, rpm]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            dpkg

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: linux-${{ matrix.bundle }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.bundle }}
        run: pnpm tauri build --bundles ${{ matrix.bundle }}

      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          case "${{ matrix.bundle }}" in
            deb)      GLOB="src-tauri/target/release/bundle/deb/*.deb" ;;
            appimage) GLOB="src-tauri/target/release/bundle/appimage/*.AppImage" ;;
            rpm)      GLOB="src-tauri/target/release/bundle/rpm/*.rpm" ;;
          esac
          echo "glob=$GLOB" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.bundle }}
          path: ${{ steps.collect.outputs.glob }}
          if-no-files-found: error
          retention-days: 7

  # ── Windows: .msi · NSIS .exe ──────────────────────────────────────────
  build-windows:
    name: Windows (${{ matrix.bundle }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        bundle: [msi, nsis]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: windows-${{ matrix.bundle }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.bundle }}
        run: pnpm tauri build --bundles ${{ matrix.bundle }}

      - name: Collect artifacts
        id: collect
        shell: pwsh
        run: |
          if ("${{ matrix.bundle }}" -eq "msi") {
            $glob = "src-tauri/target/release/bundle/msi/*.msi"
          } else {
            $glob = "src-tauri/target/release/bundle/nsis/*.exe"
          }
          echo "glob=$glob" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.bundle }}
          path: ${{ steps.collect.outputs.glob }}
          if-no-files-found: error
          retention-days: 7

  # ── GitHub Release ──────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: false

      - name: Flatten artifact directories
        run: |
          mkdir -p release-files
          find dist/ -type f \( \
            -name "*.deb" -o \
            -name "*.AppImage" -o \
            -name "*.rpm" -o \
            -name "*.msi" -o \
            -name "*.exe" \
          \) -exec cp {} release-files/ \;
          echo "Files to release:"
          ls -lh release-files/

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ZFileSync ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true
          body: |
            ## ZFileSync ${{ steps.version.outputs.tag }}

            ### Downloads

            | Platform | Package | Format |
            |----------|---------|--------|
            | 🐧 Linux | `.deb` | Debian / Ubuntu / Mint |
            | 🐧 Linux | `.rpm` | Fedora / openSUSE / RHEL |
            | 🐧 Linux | `.AppImage` | Universal (any distro) |
            | 🪟 Windows | `.msi` | Windows Installer |
            | 🪟 Windows | `.exe` | NSIS Installer |

            ---

            **Website & docs:** https://zsync.eu/zfilesync/
            **Source:** https://github.com/TheHolyOneZ/ZFileSync
            **License:** GPL-3.0
          files: release-files/*
